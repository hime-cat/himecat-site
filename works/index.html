<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works | himecat</title>
    <meta name="description" content="himecatが制作したアプリやゲームの一覧です。">
    <meta property="og:title" content="Works | himecat">
    <meta property="og:description" content="himecatが制作したアプリやゲームの一覧です。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://himecat.com/works/">
    <meta property="og:image" content="https://himecat.com/images/ogp/site.png?v=2">
    <meta property="og:image:width" content="1729">
    <meta property="og:image:height" content="910">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://himecat.com/works/">
    <link rel="icon" type="image/webp" href="../images/decor/paw.webp">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/main.js" defer></script>
  </head>
  <body data-site-root="../">
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="../" aria-label="himecat ホーム">
          <img src="../images/himecat-title.webp" alt="himecat">
        </a>
        <button class="menu-button" type="button" aria-expanded="false" aria-controls="site-nav" data-menu-button>
          Menu
        </button>
        <nav class="site-nav" id="site-nav" aria-label="メインナビゲーション" data-menu>
          <ul>
            <li><a href="../">Home</a></li>
            <li><a href="./" aria-current="page">Works</a></li>
            <li><a href="../about/">About</a></li>
            <li><a href="../links/">Links</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-hero page-hero--wide page-hero--decor">
        <img class="decor decor--hero-sparkle" src="../images/decor/sparkle.webp" alt="" aria-hidden="true">
        <img class="decor decor--hero-clover" src="../images/decor/clover.webp" alt="" aria-hidden="true">
        <div>
          <p class="eyebrow">Works</p>
          <h1>作ったものたち</h1>
          <p class="lead">
            考えすぎた結果、<br>
            アプリやゲームになりました。
          </p>
        </div>
        <img class="page-hero__image" src="../images/hero/works.webp" alt="植物に囲まれた机でノートパソコンに向かう猫耳の女の子">
      </section>

      <section class="section section--soft section--decor">
        <img class="decor decor--list-paw" src="../images/decor/paw.webp" alt="" aria-hidden="true">
        <img class="decor decor--list-leaf" src="../images/decor/leaf.webp" alt="" aria-hidden="true">
        <div class="section-inner">
          <div class="filter-row" aria-label="作品カテゴリで絞り込む">
            <button class="filter-button is-active" type="button" aria-pressed="true" data-filter="all">すべて</button>
            <button class="filter-button" type="button" aria-pressed="false" data-filter="アプリ">アプリ</button>
            <button class="filter-button" type="button" aria-pressed="false" data-filter="ゲーム">ゲーム</button>
          </div>
          <div class="works-grid" data-works-list="all">
            <p class="notice">作品一覧を読み込んでいます。</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p class="footer-credit"><img src="../images/decor/cat-mark.webp" alt="" aria-hidden="true">&copy; himecat</p>
        <ul class="footer-links">
          <li><a href="https://x.com/_himecat" target="_blank" rel="noopener noreferrer">X</a></li>
          <li><a href="https://www.instagram.com/hime_c4t" target="_blank" rel="noopener noreferrer">Instagram</a></li>
        </ul>
      </div>
    </footer>
  </body>
</html>
