<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Nyussionは、言葉に小さなニュアンスを添えるための5秒ツールです。"
    >
    <meta property="og:title" content="Nyussion">
    <meta property="og:description" content="言葉に小さなニュアンスを添えるための5秒ツールです。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://himecat.com/works/nyussion/app/">
    <meta property="og:image" content="https://himecat.com/works/nyussion/app/images/ogp.png">
    <meta property="og:image:width" content="1672">
    <meta property="og:image:height" content="941">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://himecat.com/works/nyussion/app/images/ogp.png">
    <meta name="theme-color" content="#fffdf8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Nyussion">
    <title>Nyussion</title>
    <link rel="canonical" href="https://himecat.com/works/nyussion/app/">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
    <script src="js/pwa.js" defer></script>
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <header class="app-header">
        <div>
          <p class="app-kicker">返信前のひと呼吸</p>
          <h1 id="app-title" class="app-title">Nyussion</h1>
        </div>
        <img class="app-header-icon" src="images/favicon.png" alt="" aria-hidden="true">
      </header>

      <section class="card composer" aria-labelledby="message-label">
        <div class="section-heading">
          <label id="message-label" class="section-label" for="message">
            本文
          </label>
          <span class="preview-note" data-selected-count>タグなし</span>
        </div>
        <textarea
          id="message"
          class="message-input"
          name="message"
          rows="5"
          placeholder="相手に送りたい言葉"
        ></textarea>
        <output class="attached-tags" data-preview aria-live="polite"></output>
      </section>

      <section class="tag-area" aria-labelledby="tag-label">
        <div class="section-heading">
          <h2 id="tag-label" class="section-label">タグ</h2>
          <button class="clear-button" type="button" data-clear-tags>
            タグを外す
          </button>
        </div>

        <div class="tag-groups" data-tag-groups></div>
      </section>

      <div class="actions" aria-label="共有">
        <a class="share-button" data-line-share href="#" target="_blank" rel="noopener">
          LINEで共有
        </a>
        <button class="copy-button" type="button" data-copy>
          コピー
        </button>
      </div>

      <p class="status-message" data-status role="status" aria-live="polite"></p>

      <footer class="app-footer">
        <small>
          &copy; 2026 Nyussion by
          <a href="https://x.com/_himecat" target="_blank" rel="noopener">himecat</a>
        </small>
      </footer>
    </main>
  </body>
</html>
